<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        background-color: #f5f0fe;
      }
      h1 {
        color: #885df1;
        text-align: center;
        font-size: 38px;
        text-decoration: underline;
      }
      h2 {
        color: #272044;
        text-align: center;
        font-size: 30px;
        font-weight: normal;
      }
      button {
        display: block;
        margin: 20px auto;
        padding: 20px 30px;
        font-size: 16px;
        background: transparent;
        color: blueviolet;
        border: 1px solid blueviolet;
        border-radius: 30px;
        box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.3);
        transition: all 200ms ease-in-out;
      }

      button:hover {
        background-color: blueviolet;
        color: white;
        cursor: pointer;
      }
      p {
        text-align: center;
      }
      img {
        width: 300px;
        display: block;
        margin: 0 auto;
      }
      ul {
        list-style: none;
        padding: 0;
        text-align: center;
      }
      li {
        text-align: center;
        display: inline;
        margin: 0 15px;
      }
      a {
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }

      .coders {
        color: blue;
      }
      .courses {
        color: red;
      }
      .stories {
        color: green;
      }
      .contact-details {
        color: black;
        text-align: center;
        font-size: 12px;
        padding: 20px;
      }
      .contact-platform {
        color: #885df1;
      }
      .info {
        font-weight: bold;
        text-align: center;
        margin: 20px;
      }
    </style>
  </head>
  <body>
    <h1>SheCodes</h1>
    <h2>Coding workshop</h2>
    <button onclick="alert('Welcome to SheCodes!')">Apply now</button>
    <ul>
      <li>
        <a
          href="https://www.shecodes.io/students"
          target="_blank"
          class="coders"
        >
          Coders
        </a>
      </li>
      <li>
        <a
          href="https://www.shecodes.io/workshops"
          target="_blank"
          class="courses"
        >
          Courses
        </a>
      </li>
      <li>
        <a
          href="https://www.shecodes.io/stories"
          target="_blank"
          class="stories"
        >
          Stories
        </a>
      </li>
    </ul>
    <hr />
    <div class="info">More info</div>
    <img
      src="https://t3.ftcdn.net/jpg/04/98/91/96/360_F_498919631_Me4XD0pVj0tX109wnyH7FIo6FHTb5J0E.jpg"
      alt="Woman coding"
    />

    <div class="contact-details">
      <span class="contact-platform">Email:</span> hello@shecodes.io
      <span class="contact-platform">Instagram:</span> @shecodes.io
    </div>
  </body>
</html>
